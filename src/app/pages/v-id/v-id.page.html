<section class="v-wrap py-4" aria-labelledby="v-title">
  <div class="container">
    <div class="v-card p-4 p-md-5">
      <h1 id="v-title" class="h3 mb-3">Registro /v/{{ id() }}</h1>

      @if (loading()) {
        <p class="mb-0">Carregando dados...</p>
      } @else if (error()) {
        <p class="v-error mb-0">{{ error() }}</p>
      } @else {
        <p class="mb-3"><strong>Classe:</strong> {{ classe() }}</p>

        @if (isPerson()) {
          <app-author-gadget
            class="mb-4 d-block"
            [name]="authorName()"
            [nameAbnt]="authorNameAbnt()"
            [authorId]="authorId()"
            [metrics]="authorMetrics()"
            [chartPoints]="chartYearsBars()"
          ></app-author-gadget>
        }

        <h2 class="h5 mb-2">JSON</h2>
        <pre class="mb-0">{{ jsonContent() }}</pre>
      }
    </div>
  </div>
</section>
