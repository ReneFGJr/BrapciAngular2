<section class="tools-wrap py-4" aria-labelledby="tools-text-title">
  <div class="container">
    <app-breadcrumbs></app-breadcrumbs>

    <div class="tools-card p-4 p-md-5">
      <p class="tools-eyebrow mb-2">{{ 'tools.kicker' | translate }}</p>
      <h1 id="tools-text-title" class="h2 mb-2">{{ 'tools.text.title' | translate }}</h1>
      <p class="tools-subtitle mb-4">
        {{ 'tools.text.subtitle' | translate }}
      </p>

      <div class="row g-3">
        <div class="col-12 col-md-6">
          <article class="tool-item p-3 h-100">
            <h2 class="h5 mb-2">{{ 'tools.text.card1Title' | translate }}</h2>
            <p class="mb-0">{{ 'tools.text.card1Text' | translate }}</p>
          </article>
        </div>
        <div class="col-12 col-md-6">
          <article class="tool-item p-3 h-100">
            <h2 class="h5 mb-2">{{ 'tools.text.card2Title' | translate }}</h2>
            <p class="mb-0">{{ 'tools.text.card2Text' | translate }}</p>
          </article>
        </div>
      </div>
    </div>
  </div>
</section>
