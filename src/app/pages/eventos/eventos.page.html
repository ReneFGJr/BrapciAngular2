<section class="perfil-wrap py-4" aria-labelledby="eventos-title">
  <div class="container">
    <app-breadcrumbs></app-breadcrumbs>
  </div>

@if (hasResults()) {
  <div class="container mt-0 mb-4">
    <div class="col-12">
      <h2 id="eventos-title" class="eventos-title mb-0">{{ 'journals.eventsList' | translate }}</h2>
    </div>
  </div>
  <div class="container revistas-grid">
    @for (journal of journals(); track journal.id_jnl) {
      <div class="revista-card border p-0">
        <div style="cursor: pointer" (click)="openV(journal)">
        @if (journal.cover) {
          <img class="revista-cover" [src]="journal.cover" [alt]="journal.jnl_name" />
        }

        <span class="mb-2 small">{{ journal.jnl_name_abrev }}</span>
        </div>
      </div>
    }
  </div>
}
</section>
