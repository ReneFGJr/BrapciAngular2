<section class="area-events" aria-labelledby="area-events-title">
  <header class="area-events-header">
    <h3 id="area-events-title" class="area-events-title">Eventos da area</h3>
  </header>

  <p *ngIf="loading()" class="area-events-state">Carregando eventos...</p>
  <p *ngIf="error()" class="area-events-state area-events-state-error">{{ error() }}</p>

  <ul *ngIf="!loading() && !error() && events().length" class="area-events-list">
    <li
      *ngFor="let event of events(); trackBy: trackByEventId"
      class="area-events-item"
      role="button"
      tabindex="0"
      (click)="goToEvent(event)"
      (keydown.enter)="goToEvent(event)"
      (keydown.space)="goToEvent(event)"
      [attr.aria-label]="'Abrir detalhes do evento ' + event.title"
    >
      <div class="area-events-logo-wrap">
        <img
          *ngIf="event.logo"
          class="area-events-logo"
          [src]="event.logo"
          [alt]="'Logo do evento ' + event.title"
          loading="lazy"
          decoding="async"
          referrerpolicy="no-referrer"
          (error)="event.logo = null"
        />
        <div *ngIf="!event.logo" class="area-events-logo-fallback" aria-hidden="true">
          EVENTO
        </div>
      </div>
      <h4 class="area-events-item-title">{{ event.title }}</h4>
      <p class="area-events-item-meta">Data: {{ event.date }} - {{ event.location }}</p>
      <a [href]="event.redirectUrl" target="_blank" rel="noreferrer" class="area-events-link" (click)="$event.stopPropagation()">
        Mais detalhes
      </a>
    </li>
  </ul>

  <p *ngIf="!loading() && !error() && !events().length" class="area-events-state">
    Nenhum evento encontrado.
  </p>
</section>
