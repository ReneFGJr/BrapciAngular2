<article class="view-card p-3 p-md-4">
  <h2 class="h5 mb-3">Revista</h2>

  <div class="tab-nav mb-3" role="tablist" aria-label="Abas de conteudo da revista">
    <button type="button" class="tab-btn" [class.active]="activeTab() === 'summary'" (click)="setTab('summary')">
      Resumo
    </button>
    <button type="button" class="tab-btn" [class.active]="activeTab() === 'issues'" (click)="setTab('issues')">
      Fasciculos
    </button>
    <button type="button" class="tab-btn" [class.active]="activeTab() === 'json'" (click)="setTab('json')">
      JSON
    </button>
  </div>

  <div class="tab-panel">
    @switch (activeTab()) {
      @case ('summary') {
        <app-journal-meta-grid
          [coverUrl]="coverUrl()"
          [issnPortalUrl]="issnPortalUrl()"
          [title]="title()"
          [acronym]="acronym()"
          [issn]="issn()"
          [eissn]="eissn()"
          [period]="period()"
          [publisher]="publisher()"
          [collection]="collection()"
          [journalId]="journalId()"
          [url]="url()"
          [oaiUrl]="oaiUrl()"
        ></app-journal-meta-grid>
      }

      @case ('issues') {
        @if (issueItems().length) {
          <app-issue-view-type
            [issues]="issueItems()"
            [acronym]="acronym()"
            [journalId]="journalId()"
          ></app-issue-view-type>
        } @else {
          <p class="mb-0">Sem fasciculos disponiveis.</p>
        }
      }

      @case ('json') {
        <pre class="json-block mb-0">{{ jsonContent() }}</pre>
      }
    }
  </div>
</article>
