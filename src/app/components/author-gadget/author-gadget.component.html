<section class="author-gadget" aria-label="Dados do autor">
  <h2 class="h5 mb-3">Gadget de Autor</h2>
  <p class="mb-1"><strong>Nome:</strong> {{ name }}</p>
  <p class="mb-1"><strong>Nome ABNT:</strong> {{ nameAbnt }}</p>
  <p class="mb-3"><strong>ID:</strong> {{ authorId }}</p>

  <div class="author-metrics">
    @for (metric of metrics; track metric.label) {
      <div class="author-metric-item">
        <small>{{ metric.label }}</small>
        <strong>{{ metric.value }}</strong>
      </div>
    }
  </div>

  <div class="author-range mt-3 mb-2" aria-label="Periodo da producao">
    <button
      type="button"
      class="btn btn-sm"
      [class.btn-primary]="selectedRange() === 'all'"
      [class.btn-outline-primary]="selectedRange() !== 'all'"
      (click)="setRange('all')"
    >
      Toda producao
    </button>

    @for (years of rangeOptions; track years) {
      <button
        type="button"
        class="btn btn-sm"
        [class.btn-primary]="selectedRange() === years"
        [class.btn-outline-primary]="selectedRange() !== years"
        (click)="setRange(years)"
      >
        {{ years }} anos
      </button>
    }
  </div>

  <app-bar-chart [title]="chartTitle()" [points]="filteredChartPoints()"></app-bar-chart>
</section>
