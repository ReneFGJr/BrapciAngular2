<section class="search-book" aria-labelledby="search-book-title">
  <form [formGroup]="form" (ngSubmit)="search()" novalidate class="p-4 border rounded shadow-sm bg-light">
    <div class="container mt-1 border border-secondary rounded-3 search-book__frame">
      <div class="row">
        <div class="col-sm-12">
          <h2 id="search-book-title" class="text-center mb-4">Busca de Trabalhos - Livros <sup><i>beta</i></sup></h2>
        </div>

        <div class="mb-3 col-sm-12 col-12">
          <label for="term" class="form-label">Palavras-chave:</label>
          <input
            id="term"
            type="text"
            formControlName="term"
            placeholder="Digite os termos de busca"
            class="form-control border border-secondary"
          />
        </div>

        <div class="mb-3 col-sm-3 col-6">
          <label for="collection" class="form-label small">Tipo de Trabalho:</label>
          <select id="collection" formControlName="collection" class="form-select border border-secondary">
            <option value="">Selecione o Tipo</option>
            <option value="BK">Livro</option>
            <option value="BC">Capitulo</option>
          </select>
        </div>

        <div class="mb-3 col-sm-3 col-6"></div>

        <div class="mb-3 col-sm-2 col-6">
          <label for="year_start" class="form-label small">Ano inicial:</label>
          <br />
          <select id="year_start" formControlName="year_start" class="border border-secondary p-2 rounded bold w-100">
            @for (year of yearsStart; track year) {
              <option [value]="year">{{ year }}</option>
            }
          </select>
        </div>

        <div class="mb-3 col-sm-2 col-6">
          <label for="year_end" class="form-label small">Ano final:</label>
          <br />
          <select id="year_end" formControlName="year_end" class="border border-secondary p-2 rounded bold w-100">
            @for (year of yearsEnd; track year) {
              <option [value]="year">{{ year }}</option>
            }
          </select>
        </div>

        <div class="text-center col-sm-2 col-12 pt-4">
          <button type="submit" class="btn btn-primary w-100" [disabled]="loading()">
            Buscar
          </button>
        </div>
      </div>
    </div>
  </form>

  @if (searched()) {
    <div class="container mt-3">
      @if (loading()) {
        <p class="mb-0">Carregando resultados...</p>
      } @else if (error()) {
        <p class="mb-0 text-danger">{{ error() }}</p>
      } @else if (hasResults()) {
        <div class="list-group search-book__results">
          @for (item of results(); track item.id + item.title) {
            <article class="list-group-item list-group-item-action d-flex justify-content-between align-items-start gap-3">
              <div>
                <h3 class="search-book__result-title mb-1">{{ item.title }}</h3>
                <p class="mb-0 search-book__result-meta">{{ item.subtitle }}</p>
              </div>

              @if (item.id) {
                <a class="btn btn-sm btn-outline-primary" [routerLink]="['/v', item.id]">Ver</a>
              }
            </article>
          }
        </div>
      }
    </div>
  }
</section>
