<article
  class="col-12"
  id="search"
  aria-labelledby="search-title"
  itemprop="mainEntity"
  itemscope
  itemtype="https://schema.org/Dataset"
>
  <div class="cardx h-100x shadow-sm border-0">
    <div class="card-body">
      <h2 id="search-title" class="search-title">{{ 'search.title' | translate }}</h2>

      <form (ngSubmit)="searchInBrapci()" class="search-form mb-0">
        <label for="query" class="form-label mb-0">{{ 'search.input' | translate }}</label>
        <div class="input-group mt-0">
          <textarea
            id="query"
            name="query"
            class="form-control border border-secondary"
            [ngModel]="query()"
            (ngModelChange)="query.set($event)"
            rows="3"
            placeholder="{{ 'search.input' | translate }}"
          ></textarea>
          <button type="submit" class="btn btn-primary" [disabled]="loading()">
            {{ 'search.button' | translate }}
          </button>
        </div>
      </form>

      <ng-container *ngIf="hasResults()">
        <app-search-result
          [results]="apiResults()"
          [sources]="filterSources()"
          [authors]="filterAuthors()"
          [keywords]="filterKeywords()"
        ></app-search-result>
      </ng-container>
    </div>
  </div>

  <!-- Filtros da Pesquisa -->
  <div class="search-actions">
    <span
      type="button"
      (click)="showFilters = !showFilters"
      class="link search-action-link"
    >
      {{ 'search.filters.title' | translate }}
    </span>
    <span class="search-actions-separator">|</span>
    <span
      type="button"
      (click)="goBooleanSearch()"
      class="link search-action-link"
    >
      {{ 'search.bollean.title' | translate }}
    </span>
  </div>

  <div
    *ngIf="showFilters"
    class="search-filters"
  >
    <form [formGroup]="filtersForm" class="search-filters-form">
      <!-- Coluna 1: Anos -->
      <div class="search-filter-col-year">
        <label for="year_start">{{ 'search.filters.year_start' | translate }}</label>
        <select id="year_start" formControlName="year_start" class="form-control">
          <option *ngFor="let y of yearsStart" [value]="y">{{ y }}</option>
        </select>
      </div>
      <div class="search-filter-col-year">
        <label for="year_end">{{ 'search.filters.year_end' | translate }}</label>
        <select id="year_end" formControlName="year_end" class="form-control">
          <option *ngFor="let y of yearsEnd" [value]="y">{{ y }}</option>
        </select>
      </div>
      <!-- Coluna 2: Tipo de publicação -->
      <div class="search-filter-col-wide">
        <label class="search-filter-title">{{ 'search.filters.publication_type' | translate }}</label>
        <div *ngFor="let pub of publicationTypes">
          <input
            type="checkbox"
            [value]="pub.value"
            (change)="onCollectionChange($event)"
            [checked]="filtersForm.value.collection.includes(pub.value)"
            id="col-{{ pub.value }}"
          />
          <label for="col-{{ pub.value }}"
            >&nbsp;{{ 'search.filters.types.' + pub.value | translate }}</label
          >
        </div>
      </div>
      <!-- Coluna 3: Local de pesquisa -->
      <div class="search-filter-col-wide">
        <label class="search-filter-title">{{ 'search.filters.search_field' | translate }}</label>
        <div *ngFor="let field of searchFields">
          <input
            type="radio"
            name="fields"
            [value]="field.value"
            formControlName="fields"
            id="field-{{ field.value }}"
            [checked]="filtersForm.value.fields === field.value"
          />
          <label for="field-{{ field.value }}" class="ms-1">{{
            'search.filters.fields.' + field.value | translate
          }}</label>
        </div>
      </div>
    </form>
  </div>


    <div
    *ngIf="showFilters"
    class="search-filters"
  >
    =={{search}}==
     <ng-container *ngIf="!hasResults()">
        <p class="hint mb-0">
          {{ query().trim() ? ('search.empty' | translate) : ('search.idle' | translate) }}
        </p>
      </ng-container>
  </div>

  <!-- ...existing code... -->
</article>
